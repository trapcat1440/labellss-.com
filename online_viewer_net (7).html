<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>theyluvlss.com</title>

  <!-- Website Icon -->
  <link rel="icon" type="image/png" href="https://i.imghippo.com/files/dQz5906Ok.png">

  <style>
    /* BODY */
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: #e0d38d;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER WITH DARK AGGRESSIVE OCEAN GRADIENT */
    header.hero {
      height: 400px;
      background: linear-gradient(-45deg, #001f3f, #003366, #004080, #001a33);
      background-size: 600% 600%;
      animation: gradientMove 6s ease infinite;

      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
    }

    @keyframes gradientMove {
      0% {
        background-position: 0% 50%;
      }

      25% {
        background-position: 100% 30%;
      }

      50% {
        background-position: 50% 70%;
      }

      75% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    /* LOGO */
    header.hero .logo {
      font-family: Georgia, serif;
      text-transform: uppercase;
      letter-spacing: 2px;
      border-bottom: 3px solid white;
      display: inline-block;
      padding-bottom: 10px;
      font-size: 40px;
    }

    /* ROBOTICS COLLECTION BLACK */
    header.hero .collection {
      letter-spacing: 2px;
      margin-top: 15px;
      font-size: 20px;
      color: black;
    }

    /* NAVBAR */
    nav {
      background: gray;
      text-align: center;
      padding: 15px;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 20px;
      font-weight: bold;
      font-size: 18px;
      position: relative;
      transition: 0.3s;
    }

    nav a:hover {
      color: white;
      text-shadow:
        0 0 5px white,
        0 0 10px white,
        0 0 20px white,
        0 0 40px #bbbbbb;
    }

    nav a::after {
      content: "";
      position: absolute;
      width: 0%;
      height: 2px;
      left: 0;
      bottom: -5px;
      background: white;
      transition: 0.4s;
    }

    nav a:hover::after {
      width: 100%;
    }

    /* MAIN CONTENT */
    main {
      flex: 1;
      text-align: center;
      padding: 40px;
    }

    button {
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      background: #333;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #555;
    }

    /* FOOTER */
    footer {
      background: #333;
      color: white;
      text-align: center;
      padding: 20px;
    }

    footer a {
      color: #ddd;
      margin: 10px;
      text-decoration: none;
    }

    footer a:hover {
      color: white;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header class="hero">
    <div class="header-content">
      <h1 class="logo">Lifestyle LSS</h1>
      <p class="collection">ROBOTICS COLLECTION</p>
    </div>
  </header>

  <!-- NAVBAR -->
  <nav>
    
    <a href="releasepage.html">Releases</a>
    <a href="aboutpage.html">About</a>
  </nav>

  <!-- MAIN CONTENT -->
  <main>
    <h2>USA</h2>
    <p>Est. 2019</p>
    <p>Envying Modern Luxury.</p>

    <br>

    <a href="https://trapcat1440.github.io/VoyagerTheGame/">
      <button>Play Voyagers TheGame</button>
    </a>

    <br><br>

      <button>LSS S26 Magazine</button>
    </a>
  </main>

  <!-- FOOTER -->
  <footer>

  </footer>

</body>

</html>
